<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programa Ejecutivo en Marketing y Gestión de un Club Internacional · Videos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:       #1B4FA8;
      --blue-dark:  #0D2F6E;
      --blue-light: #e8eef8;
      --text:       #1a1a2e;
      --muted:      #6b7280;
      --border:     #d0daf0;
      --white:      #ffffff;
      --bg:         #f4f7fd;
      --success:    #16a34a;
      --error:      #dc2626;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    .nav { background: var(--blue-dark); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 12px rgba(0,0,0,.25); }
    .nav-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .nav-icon { width: 38px; height: 38px; background: rgba(255,255,255,.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .nav-title { color: var(--white); font-size: 15px; font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-user { color: rgba(255,255,255,.6); font-size: 13px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-nav { background: var(--white); color: var(--blue-dark); font-weight: 700; font-size: 13px; padding: 8px 18px; border-radius: 50px; border: none; cursor: pointer; font-family: inherit; transition: opacity .2s; }
    .btn-nav:hover { opacity: .85; }
    .btn-nav.ghost { background: transparent; color: var(--white); border: 2px solid rgba(255,255,255,.35); }
    .btn-nav.ghost:hover { border-color: white; opacity: 1; }

    /* HERO */
    .hero { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%); padding: 52px 40px 44px; }
    .hero-inner { max-width: 1060px; margin: 0 auto; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); color: var(--white); font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 50px; margin-bottom: 14px; }
    .hero h1 { color: var(--white); font-size: clamp(22px,3vw,36px); font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
    .hero p { color: rgba(255,255,255,.75); font-size: 16px; }

    /* MAIN */
    .main { max-width: 1060px; margin: 0 auto; padding: 48px 40px; }

    /* AUTH */
    .auth-wrap { min-height: calc(100vh - 68px); display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 40px 20px; }
    .auth-card { background: var(--white); border-radius: 20px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(13,47,110,.13); }
    .auth-logo { width: 54px; height: 54px; background: linear-gradient(135deg, var(--blue-dark), var(--blue)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 20px; }
    .auth-card h2 { font-size: 22px; font-weight: 800; color: var(--blue-dark); margin-bottom: 6px; }
    .auth-card > p { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    .auth-switch { text-align: center; margin-top: 18px; }
    .auth-switch button { background: none; border: none; color: var(--blue); font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; text-decoration: underline; }

    /* FORMS */
    .fg { margin-bottom: 16px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .fg input, .fg textarea { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--white); color: var(--text); outline: none; transition: border-color .2s; }
    .fg input:focus, .fg textarea:focus { border-color: var(--blue); }
    .fg textarea { resize: vertical; min-height: 80px; }
    .btn-primary { width: 100%; background: var(--blue-dark); color: var(--white); font-weight: 700; font-size: 15px; padding: 13px; border-radius: 50px; border: none; cursor: pointer; font-family: inherit; margin-top: 6px; transition: background .2s, transform .15s; }
    .btn-primary:hover { background: var(--blue); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s; }
    .btn-secondary:hover { background: var(--border); }
    .form-err { color: var(--error); font-size: 13px; margin-top: 10px; padding: 10px 14px; background: #fef2f2; border-radius: 8px; }
    .form-ok  { color: var(--success); font-size: 13px; margin-top: 10px; padding: 10px 14px; background: #f0fdf4; border-radius: 8px; }

    /* DIVIDER */
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; font-weight: 600; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* VIDEOS GRID */
    .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 8px; }
    .video-card { background: var(--white); border: 2px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .2s; }
    .video-card:hover { border-color: var(--blue); box-shadow: 0 8px 32px rgba(27,79,168,.15); transform: translateY(-3px); }
    .video-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, var(--blue-dark), var(--blue)); position: relative; overflow: hidden; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(13,47,110,.3); transition: background .2s; }
    .video-card:hover .play-overlay { background: rgba(13,47,110,.52); }
    .play-circle { width: 52px; height: 52px; background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,.3); transition: transform .2s; }
    .video-card:hover .play-circle { transform: scale(1.1); }
    .video-info { padding: 18px 20px; }
    .video-num { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .video-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.4; }
    .video-desc { font-size: 13px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* PLAYER */
    .player-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    .player-modal {
      background: #0a1f4e;
      border-radius: 16px;
      width: 100%;
      max-width: 1100px;
      max-height: min(92dvh, 900px);
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.8);
      animation: slideUp .2s ease;
      display: flex;
      flex-direction: column;
    }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    .player-topbar {
      background: #0a1f4e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 6;
    }
    .player-topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .player-module-badge {
      background: var(--blue);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: .5px;
      flex-shrink: 0;
    }
    .player-title {
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-close { background: rgba(255,255,255,.1); border: none; color: var(--white); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background .2s; flex-shrink: 0; }
    .player-close:hover { background: rgba(255,255,255,.2); }

    .player-video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      flex-shrink: 0;
    }
    .player-video-wrap iframe {
      position: absolute;
      top: -68px;
      left: 0;
      width: 100%;
      height: calc(100% + 136px);
      border: none;
      display: block;
    }
    .yt-cover-top,
    .yt-cover-bottom {
      position: absolute;
      left: 0;
      right: 0;
      background: transparent;
      z-index: 5;
      pointer-events: none;
    }
    .yt-cover-top {
      top: 0;
      height: 0;
    }
    .yt-cover-bottom {
      bottom: 0;
      height: 0;
    }

    .player-controls {
      background: #071530;
      padding: 8px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      user-select: none;
      flex-shrink: 0;
      position: relative;
      z-index: 6;
    }
    .progress-row { display: flex; align-items: center; gap: 10px; }
    .progress-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,.18);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
      transition: height .15s;
      min-width: 0;
    }
    .progress-track:hover { height: 8px; }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
      pointer-events: none;
      position: relative;
      transition: width .3s linear;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,.5);
      opacity: 0;
      transition: opacity .15s;
    }
    .progress-track:hover .progress-fill::after { opacity: 1; }
    .time-lbl { color: rgba(255,255,255,.7); font-size: 12px; font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }

    .btns-row { display: flex; align-items: center; gap: 4px; min-width: 0; }
    .cbtn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .cbtn:hover { background: rgba(255,255,255,.12); }
    .cbtn svg { width: 20px; height: 20px; fill: white; display: block; }
    .cbtn.lg svg { width: 24px; height: 24px; }
    .vol-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .vol-slider {
      width: 72px;
      height: 4px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      outline: none;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
    }
    .spacer { flex: 1; min-width: 8px; }
    .player-desc { padding: 12px 18px 14px; color: rgba(255,255,255,.55); font-size: 13px; line-height: 1.6; background: #071530; border-top: 1px solid rgba(255,255,255,.06); }
    .player-ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .player-modal:fullscreen,
    .player-modal:-webkit-full-screen,
    .player-modal.player-modal-pseudo-fs {
      width: 100vw;
      max-width: none;
      height: 100dvh;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
      background: #000;
    }
    .player-modal:fullscreen .player-video-wrap,
    .player-modal:-webkit-full-screen .player-video-wrap,
    .player-modal.player-modal-pseudo-fs .player-video-wrap {
      flex: 1 1 auto;
      aspect-ratio: auto;
      min-height: 0;
    }
    .player-modal:fullscreen .player-video-wrap iframe,
    .player-modal:-webkit-full-screen .player-video-wrap iframe,
    .player-modal.player-modal-pseudo-fs .player-video-wrap iframe {
      width: 100%;
      top: -42px;
      height: calc(100% + 84px);
    }
    .player-modal:fullscreen .player-topbar,
    .player-modal:-webkit-full-screen .player-topbar,
    .player-modal.player-modal-pseudo-fs .player-topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      transition: opacity .2s ease, transform .2s ease;
    }
    .player-modal:fullscreen .player-controls,
    .player-modal:-webkit-full-screen .player-controls,
    .player-modal.player-modal-pseudo-fs .player-controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 8;
      transition: opacity .2s ease, transform .2s ease;
    }
    .player-modal:fullscreen .player-desc,
    .player-modal:-webkit-full-screen .player-desc,
    .player-modal.player-modal-pseudo-fs .player-desc {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 74px;
      z-index: 8;
      transition: opacity .2s ease, transform .2s ease;
      background: rgba(7, 21, 48, .92);
    }
    .player-modal:fullscreen .player-topbar.player-ui-hidden,
    .player-modal:-webkit-full-screen .player-topbar.player-ui-hidden,
    .player-modal.player-modal-pseudo-fs .player-topbar.player-ui-hidden {
      transform: translateY(-100%);
    }
    .player-modal:fullscreen .player-controls.player-ui-hidden,
    .player-modal:-webkit-full-screen .player-controls.player-ui-hidden,
    .player-modal.player-modal-pseudo-fs .player-controls.player-ui-hidden,
    .player-modal:fullscreen .player-desc.player-ui-hidden,
    .player-modal:-webkit-full-screen .player-desc.player-ui-hidden,
    .player-modal.player-modal-pseudo-fs .player-desc.player-ui-hidden {
      transform: translateY(100%);
    }

    /* ADMIN TABS */
    .admin-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
    .admin-tab { background: none; border: none; padding: 10px 22px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color .2s, border-color .2s; }
    .admin-tab.active { color: var(--blue-dark); border-bottom-color: var(--blue-dark); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 36px; }
    .stat-card { background: var(--bg); border: 2px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .stat-num { font-size: 30px; font-weight: 800; color: var(--blue-dark); }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-top: 4px; }

    /* ADD FORM */
    .add-form { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 26px 28px; margin-bottom: 28px; }
    .add-form h3 { font-size: 16px; font-weight: 800; color: var(--blue-dark); margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .url-hint { margin-top: 8px; padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .url-hint.ok { background: #f0fdf4; color: var(--success); }
    .url-hint.bad { background: #fef2f2; color: var(--error); }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .form-actions .btn-primary { width: auto; padding: 10px 26px; }

    /* VIDEO LIST ADMIN */
    .video-list { display: flex; flex-direction: column; gap: 10px; }
    .video-row { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
    .vr-order { width: 34px; height: 34px; flex-shrink: 0; background: var(--blue-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--blue-dark); }
    .vr-info { flex: 1; min-width: 0; }
    .vr-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .vr-views { background: var(--blue-light); color: var(--blue-dark); font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 50px; flex-shrink: 0; }
    .vr-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 50px; background: #fef3c7; color: #92400e; }
    .vr-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-sm { background: none; border: 2px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--text); transition: border-color .15s, color .15s; }
    .btn-sm:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm.danger:hover { border-color: var(--error); color: var(--error); }

    /* EMAILS TABLE */
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 2px solid var(--border); }
    .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg); }

    /* BULK TEXTAREA */
    .bulk-area { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 13px; font-family: monospace; min-height: 120px; resize: vertical; outline: none; transition: border-color .2s; }
    .bulk-area:focus { border-color: var(--blue); }
    .bulk-hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }

    /* SECTION */
    .sec-hdr { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .sec-hdr h2 { font-size: 24px; font-weight: 800; color: var(--blue-dark); }
    .sec-title { font-size: 17px; font-weight: 800; color: var(--blue-dark); margin-bottom: 16px; margin-top: 28px; }

    /* CONFIRM */
    .confirm-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 800; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .confirm-box { background: var(--white); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; box-shadow: 0 12px 48px rgba(0,0,0,.2); }
    .confirm-box h3 { font-size: 18px; font-weight: 800; color: var(--blue-dark); margin-bottom: 10px; }
    .confirm-box p { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }
    .btn-danger { background: var(--error); color: var(--white); border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--blue-dark); color: var(--white); padding: 13px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 24px rgba(0,0,0,.25); animation: toastIn .25s ease; max-width: 320px; }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--error); }
    @keyframes toastIn { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    /* MISC */
    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 80px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 64px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 14px; }
    .empty p { font-size: 15px; }
    .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--blue-light); color: var(--blue-dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 50px; }

    @media (max-width: 900px) {
      .nav { padding: 12px 20px; }
      .hero { padding: 42px 24px 36px; }
      .main { padding: 36px 24px; }
      .player-modal { max-height: min(94dvh, 860px); }
      .player-topbar { padding: 12px 16px; }
      .player-title { font-size: 14px; }
    }

    @media (max-width: 640px) {
      .nav { padding: 12px 16px; gap: 10px; }

function extractYtId(url) {
  const ps = [
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/,
  ];
  for (const p of ps) { const m = url.match(p); if (m) return m[1]; }
  return null;
}

function useSaved(key, init) {
  const [v, setV] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(val => {
    setV(val);
    if (val === null) localStorage.removeItem(key);
    else localStorage.setItem(key, JSON.stringify(val));
  }, [key]);
  return [v, set];
}

function VideoPlayer({ video, userEmail, onClose }) {
  const playerRef  = React.useRef(null);
  const iframeId   = "yt-iframe-" + video.id.replace(/-/g,"").slice(0,8);
  const tickRef    = React.useRef(null);
  const modalRef   = React.useRef(null);
  const chromeTimerRef = React.useRef(null);

  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [current, setCurrent] = useState(0);
  const [duration, setDuration] = useState(0);
  const [vol, setVol] = useState(80);
  const [muted, setMuted] = useState(false);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [isPseudoFS, setIsPseudoFS] = useState(false);
  const [chromeVisible, setChromeVisible] = useState(true);

  const fullScreenActive = isFullscreen || isPseudoFS;

  function fmt(s) {
    if (!s || isNaN(s)) return "0:00";
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,"0")}`;
  }

  async function lockLandscape() {
    try {
      if (window.matchMedia("(max-width: 900px)").matches && screen.orientation?.lock) {
        await screen.orientation.lock("landscape");
      }
    } catch (_) {}
  }

  function unlockOrientation() {
    try { screen.orientation?.unlock?.(); } catch (_) {}
  }

  function clearChromeTimer() {
    if (chromeTimerRef.current) {
      clearTimeout(chromeTimerRef.current);
      chromeTimerRef.current = null;
    }
  }

  function scheduleChromeHide() {
    clearChromeTimer();
    if (!fullScreenActive) return;
    chromeTimerRef.current = setTimeout(() => {
      setChromeVisible(false);
    }, 1800);
  }

  function showChromeTemporarily() {
    if (!fullScreenActive) return;
    setChromeVisible(true);
    scheduleChromeHide();
  }

  useEffect(() => {
    sb.recordView(video.id, userEmail);
    document.body.style.overflow = "hidden";

    const prevent = e => e.preventDefault();
    const syncFS = () => {
      const activeEl = document.fullscreenElement || document.webkitFullscreenElement || null;
      setIsFullscreen(activeEl === modalRef.current);
      if (!activeEl) unlockOrientation();
    };
    const esc = e => {
      if (e.key === "Escape") {
        const pseudoFsActive = modalRef.current?.classList.contains("player-modal-pseudo-fs");
        if (document.fullscreenElement || document.webkitFullscreenElement || pseudoFsActive) exitFS();
        else onClose();
      }
    };

    document.addEventListener("contextmenu", prevent);
    document.addEventListener("keydown", esc);
    document.addEventListener("fullscreenchange", syncFS);
    document.addEventListener("webkitfullscreenchange", syncFS);

    function initPlayer() {
      playerRef.current = new window.YT.Player(iframeId, {
        events: {
          onReady(e) {
            e.target.setVolume(vol);
            e.target.playVideo();
            setDuration(e.target.getDuration());
          },
          onStateChange(e) {
            const YT = window.YT.PlayerState;
            if (e.data === YT.PLAYING) {
              setPlaying(true);
              setDuration(playerRef.current.getDuration());
              clearInterval(tickRef.current);
              tickRef.current = setInterval(() => {
                const c = playerRef.current?.getCurrentTime() || 0;
                const d = playerRef.current?.getDuration() || 1;
                setCurrent(c);
                setProgress((c / d) * 100);
              }, 500);
            } else {
              setPlaying(false);
              clearInterval(tickRef.current);
            }
          },
        },
      });
    }

    if (window.YT && window.YT.Player) {
      initPlayer();
    } else {
      const existing = document.querySelector('script[src="https://www.youtube.com/iframe_api"]');
      if (!existing) {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
      }
      window.onYouTubeIframeAPIReady = initPlayer;
    }

    return () => {
      clearInterval(tickRef.current);
      document.removeEventListener("contextmenu", prevent);
      document.removeEventListener("keydown", esc);
      document.removeEventListener("fullscreenchange", syncFS);
      document.removeEventListener("webkitfullscreenchange", syncFS);
      document.body.style.overflow = "";
      unlockOrientation();
      try { playerRef.current?.destroy(); } catch(e) {}
    };
  }, [video.id, userEmail]);

  useEffect(() => {
    if (fullScreenActive) {
      setChromeVisible(true);
      scheduleChromeHide();
    } else {
      clearChromeTimer();
      setChromeVisible(true);
    }

    return () => clearChromeTimer();
  }, [fullScreenActive]);

  function togglePlay() {
    if (!playerRef.current) return;
    playing ? playerRef.current.pauseVideo() : playerRef.current.playVideo();
  }

  function seek(e) {
    if (!playerRef.current || !duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    playerRef.current.seekTo(pct * duration, true);
    setProgress(pct * 100);
  }

  function skip(secs) {
    if (!playerRef.current) return;
    playerRef.current.seekTo((playerRef.current.getCurrentTime() || 0) + secs, true);
  }

  function changeVol(e) {
    const v = parseInt(e.target.value, 10);
    setVol(v);
    setMuted(v === 0);
    playerRef.current?.setVolume(v);
    playerRef.current?.unMute();
  }

  function toggleMute() {
    if (!playerRef.current) return;
    if (muted) {
      playerRef.current.unMute();
      playerRef.current.setVolume(vol || 80);
      setMuted(false);
    } else {
      playerRef.current.mute();
      setMuted(true);
    }
  }

  async function enterFS() {
    const el = modalRef.current;
    if (!el) return;

    const requestFS = el.requestFullscreen || el.webkitRequestFullscreen;
    if (requestFS) {
      try {
        await requestFS.call(el);
        await lockLandscape();
        return;
      } catch (_) {}
    }

    setIsPseudoFS(true);
    await lockLandscape();
  }

  async function exitFS() {
    const activeEl = document.fullscreenElement || document.webkitFullscreenElement || null;
    const exit = document.exitFullscreen || document.webkitExitFullscreen;

    if (activeEl && exit) {
      try { await exit.call(document); } catch (_) {}
    }

    setIsPseudoFS(false);
    unlockOrientation();
  }

  function toggleFS() {
    fullScreenActive ? exitFS() : enterFS();
  }

  const chromeClass = !fullScreenActive || chromeVisible ? "" : " player-ui-hidden";

  const params = new URLSearchParams({

    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>

  const IconPause = () => (

  const IconBack = () => (
    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="9" y="15" fontSize="6" fill="white" fontWeight="bold">10</text></svg>
  );
  const IconFwd = () => (
    <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="9" y="15" fontSize="6" fill="white" fontWeight="bold">10</text></svg>
  );
  const IconVolOn = () => (
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
  );
  const IconVolOff = () => (
    <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  );
  const IconFS = () => (
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  );
  const IconExitFS = () => (
    <svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
  );

  return (
    <div className="player-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div
        className={`player-modal ${isPseudoFS ? "player-modal-pseudo-fs" : ""}`}
        ref={modalRef}
        onContextMenu={e => e.preventDefault()}
        onMouseMove={showChromeTemporarily}
        onTouchStart={showChromeTemporarily}
        onClick={showChromeTemporarily}
      >
        <div className={`player-topbar${chromeClass}`}>
          <div className="player-topbar-left">
            <span className="player-module-badge">Módulo {video.order_index}</span>
            <span className="player-title">{video.title}</span>
          </div>
          <button className="player-close" onClick={onClose} title="Cerrar (Esc)">✕</button>
        </div>

        <div className="player-video-wrap" onContextMenu={e => e.preventDefault()}>
          <iframe
            id={iframeId}
            src={src}
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            allowFullScreen
            title={video.title}
          />
          <div className="yt-cover-top" />
          <div className="yt-cover-bottom" />
        </div>

        <div className={`player-controls${chromeClass}`}>
          <div className="progress-row">
            <span className="time-lbl">{fmt(current)}</span>
            <div className="progress-track" onClick={seek}>
              <div className="progress-fill" style={{ width: progress + "%" }} />
            </div>
            <span className="time-lbl">{fmt(duration)}</span>
          </div>

          <div className="btns-row">
            <button className="cbtn lg" onClick={togglePlay} title={playing ? "Pausar" : "Reproducir"}>
              {playing ? <IconPause /> : <IconPlay />}
            </button>
            <button className="cbtn" onClick={() => skip(-10)} title="Retroceder 10s"><IconBack /></button>
            <button className="cbtn" onClick={() => skip(10)} title="Adelantar 10s"><IconFwd /></button>

            <div className="vol-wrap" style={{marginLeft:4}}>
              <button className="cbtn" onClick={toggleMute} title={muted ? "Activar sonido" : "Silenciar"}>
                {muted ? <IconVolOff /> : <IconVolOn />}
              </button>
              <input className="vol-slider" type="range" min="0" max="100" value={muted ? 0 : vol} onChange={changeVol} />
            </div>

            <div className="spacer" />

            <button className="cbtn" onClick={toggleFS} title={fullScreenActive ? "Salir de pantalla completa" : "Pantalla completa"}>
              {fullScreenActive ? <IconExitFS /> : <IconFS />}
            </button>
          </div>
        </div>

        {video.description && (
          <div className={`player-desc${chromeClass}`}>📄 {video.description}</div>
        )}
      </div>
    </div>
  );
}

        {loading ? <div className="spinner" /> : videos.length === 0 ? (

function VideoForm({ initial, token, onSave, onCancel }) {
  const [form, setForm] = useState({
    title:        initial?.title        || "",
    description:  initial?.description  || "",
    youtube_url:  initial?.youtube_url  || "",
    order_index:  initial?.order_index  || 1,
    is_published: initial?.is_published ?? true,
  });
  const [ytId, setYtId] = useState(initial?.youtube_id || "");
  const [saving, setSaving] = useState(false);
  const [urlErr, setUrlErr] = useState("");

  function changeUrl(url) {
    setForm(f => ({ ...f, youtube_url: url }));
    const id = extractYtId(url.trim());
    setYtId(id || "");
    setUrlErr(url && !id ? "URL de YouTube no reconocida" : "");
  }

  async function submit(e) {
    e.preventDefault();
    if (!ytId) { setUrlErr("Pegá un link válido de YouTube"); return; }
    setSaving(true);
    try {
      const payload = {
        title: form.title,
        description: form.description,
        youtube_url: form.youtube_url,
        youtube_id: ytId,
        order_index: parseInt(form.order_index, 10) || 1,
        is_published: form.is_published,
      };
      if (initial?.id) await sb.updateVideo(initial.id, payload, token);
      else await sb.insertVideo(payload, token);
      onSave();
    } finally {
      setSaving(false);
    }
  }

  return (
    <div className="add-form">
      <h3>{initial ? "✏️ Editar video" : "➕ Agregar video"}</h3>
      <form onSubmit={submit}>
        <div className="fg">
          <label>Link de YouTube (privado / no listado)</label>
          <input type="text" value={form.youtube_url} onChange={e => changeUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=XXXXXXXXXXX" required />
          {ytId && <div className="url-hint ok">✅ Video detectado — los usuarios nunca verán este link</div>}
          {urlErr && <div className="url-hint bad">⚠️ {urlErr}</div>}
        </div>
        <div className="form-row">
          <div className="fg">
            <label>Título del módulo</label>
            <input value={form.title} onChange={e => setForm(f => ({...f, title:e.target.value}))} placeholder="Módulo 1 – Estrategia Deportiva" required />
          </div>
          <div className="fg">
            <label>Orden</label>
            <input type="number" min="1" value={form.order_index} onChange={e => setForm(f => ({...f, order_index:e.target.value}))} />
          </div>
        </div>
        <div className="fg">
          <label>Descripción</label>
          <textarea value={form.description} onChange={e => setForm(f => ({...f, description:e.target.value}))} placeholder="Descripción breve del módulo…" />
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <input type="checkbox" id="pub" checked={form.is_published} onChange={e => setForm(f => ({...f, is_published:e.target.checked}))} style={{width:"auto",accentColor:"var(--blue-dark)"}} />
          <label htmlFor="pub" style={{marginBottom:0,fontWeight:600,fontSize:14}}>Publicado (visible para participantes)</label>
        </div>
        <div className="form-actions">
          <button type="submit" className="btn-primary" disabled={saving}>{saving ? "Guardando…" : initial ? "Guardar cambios" : "Agregar video"}</button>
          {onCancel && <button type="button" className="btn-secondary" onClick={onCancel}>Cancelar</button>}
        </div>
      </form>
    </div>
  );
}

function EmailsTab({ token, toast }) {
  const [emails, setEmails] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newEmail, setNewEmail] = useState("");
  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);
  const [bulk, setBulk] = useState("");
  const [bulkLoading, setBulkLoading] = useState(false);
  const [delTarget, setDelTarget] = useState(null);
  const [search, setSearch] = useState("");

  async function load() {
    setLoading(true);
    const d = await sb.getAllowedEmails(token);
    setEmails(Array.isArray(d) ? d : []);
    setLoading(false);
  }
  useEffect(() => { load(); }, []);

  async function addOne(e) {
    e.preventDefault();
    setAdding(true);
    try {
      const res = await sb.insertAllowedEmail(newEmail, newName, token);
      if (res?.code === "23505" || (Array.isArray(res) && res[0]?.code === "23505")) {
        toast("Ese email ya existe", "error");
        return;
      }
      toast("Email agregado", "success");
      setNewEmail("");
      setNewName("");
      load();
    } finally {
      setAdding(false);
    }
  }

  async function addBulk() {
    if (!bulk.trim()) return;
    setBulkLoading(true);
    try {
      const lines = bulk.trim().split("\n").map(l => l.trim()).filter(Boolean);
      const rows = lines.map(line => {
        const parts = line.split(/[,\t]+/);
        const email = parts[0]?.trim().toLowerCase();
        const name  = parts[1]?.trim() || null;
        return email ? { email, name } : null;
      }).filter(Boolean);

      if (rows.length === 0) {
        toast("No se detectaron emails válidos", "error");
        return;
      }

      await sb.bulkInsertEmails(rows, token);
      toast(`${rows.length} emails agregados (duplicados ignorados)`, "success");
      setBulk("");
      load();
    } finally {
      setBulkLoading(false);
    }
  }

  async function doDelete(email) {
    await sb.deleteAllowedEmail(email, token);
    toast("Email eliminado", "success");
    setDelTarget(null);
    load();
  }

  const filtered = emails.filter(e =>
    e.email.includes(search.toLowerCase()) ||
    (e.name || "").toLowerCase().includes(search.toLowerCase())
  );

  return (
    <>
      <div className="sec-title">Agregar email individual</div>
      <div className="add-form">
        <form onSubmit={addOne}>
          <div className="form-row">
            <div className="fg">
              <label>Email del participante</label>
              <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="socio@gmail.com" required />
            </div>
            <div className="fg">
              <label>Nombre (opcional)</label>
              <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="Juan Pérez" />
            </div>
          </div>
          <div className="form-actions">
            <button type="submit" className="btn-primary" disabled={adding}>{adding ? "Agregando…" : "Agregar email"}</button>
          </div>
        </form>
      </div>

      <div className="sec-title">Cargar lista masiva de emails</div>
      <div className="add-form">
        <textarea
          className="bulk-area"
          value={bulk}
          onChange={e => setBulk(e.target.value)}
          placeholder={`Pegá uno por línea. Formatos aceptados:\nsocio1@gmail.com\nsocio2@gmail.com, Juan Pérez\nsocio3@gmail.com`}
        />
        <p className="bulk-hint">Cada línea = un email. Podés incluir nombre separado por coma. Los duplicados se ignoran automáticamente.</p>
        <div className="form-actions" style={{marginTop:14}}>
          <button className="btn-primary" onClick={addBulk} disabled={bulkLoading || !bulk.trim()} style={{width:"auto",padding:"10px 26px"}}>
            {bulkLoading ? "Cargando…" : "Cargar lista"}
          </button>
        </div>
      </div>

      <div className="sec-hdr" style={{marginTop:28}}>
        <div className="sec-title" style={{margin:0}}>Emails habilitados ({emails.length})</div>
        <input
          style={{padding:"8px 14px",border:"2px solid var(--border)",borderRadius:10,fontSize:13,fontFamily:"inherit",outline:"none",width:"min(220px, 100%)"}}
          placeholder="Buscar…"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
      </div>

      {loading ? <div className="spinner" /> : filtered.length === 0 ? (
        <div className="empty"><div className="icon">📧</div><p>No hay emails registrados aún.</p></div>
      ) : (
        <div style={{overflowX:"auto"}}>
          <table className="data-table">
            <thead><tr><th>Email</th><th>Nombre</th><th>Agregado</th><th></th></tr></thead>
            <tbody>
              {filtered.map(e => (
                <tr key={e.email}>
                  <td>{e.email}</td>
                  <td>{e.name || <span style={{color:"var(--muted)"}}>—</span>}</td>
                  <td>{new Date(e.created_at).toLocaleDateString("es-AR")}</td>
                  <td><button className="btn-sm danger" onClick={() => setDelTarget(e.email)}>🗑 Eliminar</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {delTarget && (
        <div className="confirm-backdrop">
          <div className="confirm-box">
            <h3>¿Eliminar email?</h3>
            <p><strong>{delTarget}</strong> ya no podrá acceder al programa.</p>
            <div className="confirm-actions">
              <button className="btn-secondary" onClick={() => setDelTarget(null)}>Cancelar</button>
              <button className="btn-danger" onClick={() => doDelete(delTarget)}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function AdminPanel({ token, adminEmail, toast }) {
  const [tab, setTab] = useState("videos");
  const [videos, setVideos] = useState([]);
  const [stats, setStats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [delVideo, setDelVideo] = useState(null);

  async function loadVideos() {
    setLoading(true);
    const [v, s] = await Promise.all([
      sb.getAllVideos(token),
      sb.getVideoStats(token),
    ]);
    setVideos(Array.isArray(v) ? v : []);
    setStats(Array.isArray(s) ? s : []);
    setLoading(false);
  }

  useEffect(() => {
    if (tab !== "emails") loadVideos();
    else setLoading(false);
  }, [tab]);

  async function doDeleteVideo(id) {
    await sb.deleteVideo(id, token);
    toast("Video eliminado", "success");
    setDelVideo(null);
    loadVideos();
  }

  const totalViews = stats.reduce((a, s) => a + Number(s.view_count || 0), 0);
  const publishedVids = videos.filter(v => v.is_published).length;

  return (
    <div className="main">
      <div className="sec-hdr">
        <h2>Panel de Administración</h2>
        <span style={{fontSize:13,color:"var(--muted)"}}>👋 {adminEmail}</span>
      </div>

      <div className="stats-row">
        <div className="stat-card"><div className="stat-num">{videos.length}</div><div className="stat-label">Videos</div></div>
        <div className="stat-card"><div className="stat-num">{publishedVids}</div><div className="stat-label">Publicados</div></div>
        <div className="stat-card"><div className="stat-num">{totalViews}</div><div className="stat-label">Reproducciones</div></div>
      </div>

      <div className="admin-tabs">
        {[["videos","🎬 Videos"],["stats","📊 Estadísticas"],["emails","📧 Emails habilitados"]].map(([t,l]) => (
          <button key={t} className={`admin-tab ${tab===t?"active":""}`} onClick={() => { setTab(t); setAdding(false); setEditing(null); }}>{l}</button>
        ))}
      </div>

      {tab === "videos" && (
        loading ? <div className="spinner" /> : <>
          {!adding && !editing && (
            <button className="btn-primary" style={{width:"auto",padding:"10px 24px",marginBottom:24}} onClick={() => setAdding(true)}>
              + Agregar video
            </button>
          )}
          {adding && <VideoForm token={token} onSave={() => { setAdding(false); loadVideos(); toast("Video guardado","success"); }} onCancel={() => setAdding(false)} />}
          {editing && <VideoForm token={token} initial={editing} onSave={() => { setEditing(null); loadVideos(); toast("Video actualizado","success"); }} onCancel={() => setEditing(null)} />}
          {!adding && !editing && (
            <div className="video-list">
              {videos.length === 0 && <div className="empty"><div className="icon">🎬</div><p>No hay videos. Agregá el primero.</p></div>}
              {videos.map(v => {
                const st = stats.find(s => s.video_id === v.id);
                return (
                  <div key={v.id} className="video-row">
                    <div className="vr-order">{v.order_index}</div>
                    <div className="vr-info">
                      <div className="vr-title">{v.title} {!v.is_published && <span className="vr-badge">No publicado</span>}</div>
                      <div className="vr-sub">ID: {v.youtube_id}</div>
                    </div>
                    <div className="vr-views">👁 {st?.view_count||0}</div>
                    <div className="vr-actions">
                      <button className="btn-sm" onClick={() => { setEditing(v); setAdding(false); }}>✏️ Editar</button>
                      <button className="btn-sm danger" onClick={() => setDelVideo(v)}>🗑 Borrar</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      {tab === "stats" && (
        loading ? <div className="spinner" /> : <>
          <div className="sec-title">Reproducciones por video</div>
          {stats.length === 0
            ? <div className="empty"><div className="icon">📊</div><p>Sin datos aún.</p></div>
            : <div style={{overflowX:"auto"}}>
                <table className="data-table">
                  <thead><tr><th>Video</th><th>Reproducciones</th><th>Espectadores únicos</th><th>Última vista</th></tr></thead>
                  <tbody>
                    {stats.map(s => (
                      <tr key={s.video_id}>
                        <td><strong>{s.title}</strong></td>
                        <td>{s.view_count}</td>
                        <td>{s.unique_viewers}</td>
                        <td>{s.last_viewed ? new Date(s.last_viewed).toLocaleDateString("es-AR") : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
          }
        </>
      )}

      {tab === "emails" && <EmailsTab token={token} toast={toast} />}

      {delVideo && (
        <div className="confirm-backdrop">
          <div className="confirm-box">
            <h3>¿Eliminar video?</h3>
            <p>Se eliminará <strong>"{delVideo.title}"</strong> y todas sus estadísticas. Esta acción no se puede deshacer.</p>
            <div className="confirm-actions">
              <button className="btn-secondary" onClick={() => setDelVideo(null)}>Cancelar</button>
              <button className="btn-danger" onClick={() => doDeleteVideo(delVideo.id)}>Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [adminSession, setAdminSession] = useSaved("vz_admin", null);
  const [userSession, setUserSession] = useSaved("vz_user", null);
  const [view, setView] = useState("videos");
  const [toast, setToast] = useState(null);

  function showToast(msg, type="default") { setToast({ msg, type, k: Date.now() }); }

  const isAdmin = !!adminSession?.access_token;
  const isUser = !!userSession?.email;
  const loggedIn = isAdmin || isUser;
  const userEmail = isAdmin ? adminSession?.user?.email : userSession?.email;

  function onUserAccess(data) { setUserSession(data); }
  function onAdminAccess(res) { setAdminSession(res); }

  async function onLogout() {
    if (isAdmin && adminSession?.access_token) await sb.adminSignOut(adminSession.access_token);
    setAdminSession(null);
    setUserSession(null);
    setView("videos");
  }

  return (
    <>
      <Nav
        userEmail={userEmail}
        isAdmin={isAdmin}
        adminMode={view === "admin"}
        onLogout={onLogout}
        goAdmin={() => setView("admin")}
        goVideos={() => setView("videos")}
      />

      {!loggedIn && (
        <AuthPage onUserAccess={onUserAccess} onAdminAccess={onAdminAccess} />
      )}

      {loggedIn && view === "videos" && (
        <VideosPage userEmail={userEmail} />
      )}

      {loggedIn && view === "admin" && isAdmin && (
        <AdminPanel token={adminSession.access_token} adminEmail={userEmail} toast={showToast} />
      )}

      {loggedIn && view === "admin" && !isAdmin && (
        <div className="main">
          <div className="empty"><div className="icon">🔒</div><p>No tenés permisos de administrador.</p></div>
        </div>
      )}

      {toast && <Toast key={toast.k} msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
